<!DOCTYPE html>
<html lang="hi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>प्रेरणा - हिन्दी हायकू संकलन</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+Devanagari:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'navy': '#0f172a',      
                        'navy-light': '#1e293b',
                        'gold': '#c29a5b',      
                        'gold-light': '#dfc28f',
                        'paper': '#ffffff',     
                        'ink': '#334155',       
                    },
                    fontFamily: {
                        'hindi': ['"Noto Serif Devanagari"', 'serif'],
                        'mal': ['"Anek Malayalam"', 'sans-serif'],
                        'body': ['"Lora"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root { --page-width: 210mm; --page-height: 297mm; }
        body { background-color: #e2e8f0; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- MAGAZINE CANVAS (SCREEN VIEW) --- */
        .page-wrapper {
            width: 100%; 
            max-width: 800px;
            background-color: #ffffff; 
            box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.15);
            margin: 0 auto; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            border-radius: 4px;
            overflow: hidden;
        }

        /* Inner Content Area */
        .page-inner {
            margin: 20mm; 
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 250mm;
        }

        .admin-active .page-inner {
            margin-top: 25mm !important;
        }

        /* Typography & Columns */
        .editorial-columns { column-count: 1; column-gap: 12mm; text-align: justify; hyphens: auto; }
        .editorial-columns p { 
            margin-bottom: 6mm; 
            line-height: 1.8; 
            font-size: 11.5pt; 
            color: #334155; 
            font-family: 'Lora', 'Noto Serif Devanagari', serif; 
        }
        
        /* Modern Drop Cap (Removed letter-spacing for Hindi support) */
        .drop-cap p:first-of-type::first-letter {
            font-size: 3.8rem; float: left; line-height: 0.8; padding: 4px 12px 0 0;
            color: #0f172a; font-weight: 900; font-family: 'Noto Serif Devanagari', serif;
        }

        /* Haiku Layout */
        .haiku-block {
            position: relative; padding: 2rem 0; margin: 2.5rem 0; text-align: center;
            border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0;
            break-inside: avoid;
        }
        .haiku-block::before {
            content: '❝'; position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            background: #ffffff; padding: 0 10px; color: #c29a5b; font-size: 2rem; line-height: 1; font-family: serif;
        }
        .haiku-block p { 
            font-size: 15pt !important; font-weight: 600; color: #0f172a; 
            margin-bottom: 0.8rem !important; font-family: 'Noto Serif Devanagari', serif; line-height: 1.9;
        }

        /* Translation Layout */
        .trans-block { margin-bottom: 2rem; padding-left: 1.5rem; border-left: 2px solid #c29a5b; break-inside: avoid; }
        .trans-block .hi { font-size: 13pt; font-weight: 600; color: #0f172a; font-family: 'Noto Serif Devanagari', serif; margin-bottom: 8px; line-height: 1.5;}
        .trans-block .ml { font-size: 11pt; color: #64748b; font-family: 'Anek Malayalam', sans-serif; line-height: 1.6;}

        /* Image Formatting */
        .img-editorial { margin-bottom: 2rem; background: #ffffff; display: flex; justify-content: center; align-items: center; padding: 4px;}
        .img-editorial img { border-radius: 2px; }
        .pos-left { float: left; margin-right: 25px; width: 45%; shape-outside: margin-box; }
        .pos-right { float: right; margin-left: 25px; width: 45%; shape-outside: margin-box; }
        .pos-top { width: 100%; margin-bottom: 2.5rem; } 
        .pos-bottom { width: 100%; margin-top: 2.5rem; margin-bottom: 0;}

        /* Form UI */
        .glass-input { 
            width: 100%; padding: 0.85rem 1rem; border: 1px solid #cbd5e1; border-radius: 6px; 
            background-color: #ffffff; font-family: 'Noto Serif Devanagari', serif; 
            outline: none; transition: all 0.2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .glass-input:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05); }

        /* Mobile Layout tweaks */
        @media (max-width: 850px) {
            .page-wrapper { width: 96%; min-height: auto; height: auto; border-radius: 8px; }
            .page-inner { margin: 25px; min-height: auto; }
            .admin-active .page-inner { margin-top: 80px !important; }
            .editorial-columns { column-count: 1; }
            .pos-left, .pos-right { float: none; width: 100%; margin: 0 0 2rem 0; }
        }

        @media (min-width: 851px) { .editorial-columns { column-count: 2; } }

        /* --- STRICT 100% PERFECT A4 PRINT STYLES --- */
        @media print {
            @page { size: A4 portrait; margin: 0 !important; padding: 0 !important; }
            
            /* Reset body to prevent extra blank pages */
            html, body { 
                width: 210mm !important; 
                height: auto !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                background: #ffffff !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            
            nav, aside, .no-print, #adminModal, #exportModal, #toast, #loader, #editModal, .admin-toolbar { 
                display: none !important; 
            }
            
            .flex-1, .flex-col, .lg\:flex-row { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            #printArea { position: static !important; display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            #pagesContainer { display: block !important; width: 100% !important; gap: 0 !important; margin: 0 !important; padding: 0 !important;}
            
            /* Lock the wrapper to exactly A4 dimensions */
            .page-wrapper { 
                position: relative !important; 
                width: 210mm !important; 
                height: 297mm !important; 
                max-height: 297mm !important;
                margin: 0 !important; 
                box-shadow: none !important; 
                border-radius: 0 !important; 
                background-color: #ffffff !important; 
                page-break-after: always !important; 
                page-break-inside: avoid !important;
                border: none !important; 
                float: none !important;
                overflow: hidden !important; /* CRITICAL: Prevents content from creating blank pages */
                display: flex !important;
                flex-direction: column !important;
                box-sizing: border-box !important;
            }
            
            /* Cover Page Exact Formatting for Print */
            .page-wrapper.cover-page {
                border: 8mm solid #0f172a !important; 
            }
            .cover-page .absolute.inset-4 {
                top: 4mm !important; left: 4mm !important; right: 4mm !important; bottom: 4mm !important;
            }
            .cover-title {
                font-size: 70pt !important; 
                line-height: 1.1 !important; 
                letter-spacing: normal !important; /* CRITICAL: Fixes Hindi broken font issue */
                margin: 10mm 0 !important;
            }
            .article-title {
                font-size: 32pt !important;
                letter-spacing: normal !important; /* Fixes Hindi text overlapping */
            }

            .page-inner { 
                margin: 20mm !important; 
                height: 257mm !important; /* 297mm - 40mm (top+bottom margin) */
                min-height: 257mm !important;
                max-height: 257mm !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                box-sizing: border-box !important;
            }
            .admin-active .page-inner { margin-top: 20mm !important; } 

            .editorial-columns { column-count: 2 !important; column-gap: 10mm !important; }
            
            .pos-left { float: left !important; width: 45% !important; margin-right: 6mm !important; }
            .pos-right { float: right !important; width: 45% !important; margin-left: 6mm !important; }
            
            img { page-break-inside: avoid !important; max-width: 100% !important; max-height: 80mm !important; object-fit: contain !important; }
            .haiku-block, .trans-block { page-break-inside: avoid !important; }
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen text-navy font-hindi">

    <!-- Premium Navbar -->
    <nav class="sticky top-0 bg-white shadow-sm z-50 border-b border-gray-200 no-print">
        <div class="max-w-7xl mx-auto px-4 py-3 md:py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-navy p-2 rounded text-white"><i class="ph ph-feather-bold text-xl"></i></div>
                <div class="flex flex-col leading-none">
                    <h1 class="text-xl md:text-2xl font-black font-hindi text-navy">हायकू संकलन</h1>
                    <p class="text-[10px] text-gray-500 font-hindi mt-1 font-bold">हिन्दी विभाग</p>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="flex gap-2 md:gap-3 items-center flex-wrap justify-end">

                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    एडमिन सक्रिय
                </div>

                <div id="exportBtnWrapper" class="hidden">
                    <button onclick="toggleExportModal()" class="bg-navy hover:bg-navy-light text-white px-4 py-2 rounded text-xs font-bold flex items-center gap-2 transition shadow-md font-hindi">
                        <i class="ph ph-export text-lg"></i> <span class="hidden sm:inline">डाउनलोड विकल्प</span>
                    </button>
                </div>

                <button id="adminBtn" onclick="openAdminModal()" class="p-2 text-gray-400 hover:text-navy transition rounded-full hover:bg-gray-100" title="एडमिन लॉगिन">
                    <i class="ph ph-shield-check text-xl"></i>
                </button>
                
                <button id="logoutBtn" onclick="logoutAdmin()" class="hidden p-2 text-red-400 hover:text-red-600 transition rounded-full hover:bg-red-50" title="लॉगआउट">
                    <i class="ph ph-sign-out text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <div class="flex-1 w-full max-w-[1400px] mx-auto flex flex-col xl:flex-row gap-8 p-4 lg:p-8">
        
        <!-- Left Sidebar: Submission Form -->
        <aside class="w-full xl:w-[380px] flex-shrink-0 no-print">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden sticky top-24">
                
                <button onclick="toggleMobileForm()" class="w-full p-5 bg-navy text-white flex justify-between items-center xl:cursor-default group">
                    <div class="flex items-center gap-3">
                        <i class="ph ph-pen-nib text-xl text-gold-light"></i>
                        <div class="text-left">
                            <h2 class="font-bold font-hindi text-lg">रचना प्रस्तुत करें</h2>
                        </div>
                    </div>
                    <i id="formArrow" class="ph ph-caret-down xl:hidden transition-transform duration-300"></i>
                </button>
                
                <div id="formContainer" class="p-6 hidden xl:block space-y-5">
                    <form id="magazineForm" class="space-y-4">
                        <div>
                            <label class="text-[11px] font-bold text-gray-500 block mb-1 font-hindi">श्रेणी</label>
                            <select id="category" class="glass-input cursor-pointer appearance-none font-bold text-navy">
                                <option value="हाइकु (Haiku)">हाइकु (Haiku)</option>
                                <option value="अनुवाद (Translation)">अनुवाद (Translation)</option>
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="text-[11px] font-bold text-gray-500 block mb-1 font-hindi">शीर्षक <span class="text-red-500">*</span></label>
                                <input type="text" id="title" class="glass-input font-bold text-lg" placeholder="शीर्षक दर्ज करें...">
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-gray-500 block mb-1 font-hindi">छात्र का नाम व कक्षा <span class="text-red-500">*</span></label>
                                <input type="text" id="author" class="glass-input" placeholder="नाम...">
                            </div>
                        </div>

                        <div class="p-4 border border-gray-200 rounded bg-gray-50/50">
                            <label class="text-[11px] font-bold text-gray-500 block mb-2 font-hindi">चित्र (वैकल्पिक)</label>
                            <label class="flex flex-col items-center justify-center w-full h-20 border border-gray-300 border-dashed bg-white rounded cursor-pointer hover:border-navy transition group">
                                <div class="flex items-center gap-2">
                                    <i class="ph ph-image text-xl text-gray-400 group-hover:text-navy transition"></i>
                                    <span class="text-xs text-gray-500 font-hindi" id="fileName">फोटो चुनें</span>
                                </div>
                                <input type="file" id="image" accept="image/*" class="hidden">
                            </label>
                            
                            <label class="text-[11px] font-bold text-gray-500 block mt-3 mb-1 font-hindi">चित्र का स्थान</label>
                            <select id="imgPos" class="glass-input py-2 text-sm cursor-pointer appearance-none">
                                <option value="top">ऊपर (Top)</option>
                                <option value="bottom">नीचे (Bottom)</option>
                                <option value="left">बाएं (Left)</option>
                                <option value="right">दाएं (Right)</option>
                            </select>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="text-[11px] font-bold text-gray-500 block font-hindi">विषय / रचना <span class="text-red-500">*</span></label>
                                <span class="text-[10px] text-gray-400 font-hindi italic">अनुवाद: Hindi ↵ Malayalam</span>
                            </div>
                            <textarea id="content" rows="6" placeholder="यहाँ लिखें..." class="glass-input resize-none leading-relaxed"></textarea>
                        </div>

                        <button type="button" id="submitBtn" class="w-full bg-navy text-white py-3.5 rounded shadow hover:bg-navy-light transition-colors font-bold font-hindi flex items-center justify-center gap-2 text-lg">
                            <i class="ph ph-paper-plane-right"></i> प्रस्तुत करें
                        </button>
                    </form>
                </div>
            </div>
        </aside>

                            <div class="h-px w-24 bg-gold mx-auto mt-6"></div>

                        <h1 class="cover-title text-[5.5rem] md:text-[7rem] font-black mb-0 font-hindi text-navy" style="line-height: 1.1;">हिन्दी हायकू<br>संकलन</h1>
                        
                        <div class="my-14 cover-icon">
                            <i class="ph ph-feather text-5xl text-gold"></i>
                        </div>
                        
                        <div class="mt-auto pt-20 flex justify-between w-full text-sm font-bold text-navy font-hindi border-t border-gray-200">
                            <span>अंक १</span>
                            <span>२०२५ - २०२६</span>
                        </div>

                </div>

                <!-- Articles injected here -->
            </div>

                    <div>

                    <div class="flex items-center gap-4 mb-3">
                        <img id="editImagePreview" class="w-16 h-16 object-cover rounded border border-gray-300 hidden">
                        <label class="flex-1 cursor-pointer">
                            <div class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded text-sm font-bold text-center hover:border-navy transition font-hindi">नया फोटो चुनें</div>
                            <input type="file" id="editImage" accept="image/*" class="hidden">
                        </label>
                    </div>
                    <select id="editImgPos" class="glass-input py-2 text-sm bg-white mb-2 font-hindi">
                        <option value="top">ऊपर (Top)</option>
                        <option value="bottom">नीचे (Bottom)</option>
                        <option value="left">बाएं (Left)</option>
                        <option value="right">दाएं (Right)</option>
                    </select>
                    <button id="removeImageBtn" class="text-xs text-red-500 font-bold w-full text-right hidden font-hindi" onclick="removeEditImage()">फोटो हटाएं</button>
                    <input type="hidden" id="editImageStatus" value="keep">
                </div>
                
                <div>
                    <label class="text-[11px] font-bold text-gray-500 font-hindi">विषय</label>
                    <textarea id="editContent" rows="6" class="glass-input mt-1 resize-none"></textarea>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-5 py-2 text-gray-500 font-bold hover:bg-gray-200 rounded transition font-hindi">रद्द करें</button>
                <button onclick="saveEditArticle()" class="bg-navy hover:bg-navy-light text-white px-6 py-2 rounded font-bold shadow transition font-hindi">सुरक्षित करें</button>
            </div>
        </div>
    </div>

    <!-- Admin Login -->
    <div id="adminModal" class="hidden fixed inset-0 bg-navy/80 z-[120] flex items-center justify-center p-4 backdrop-blur-sm no-print">
        <div class="bg-white p-8 rounded-lg w-full max-w-sm shadow-2xl fade-in text-center border-t-4 border-navy">
            <i class="ph ph-shield-check text-4xl text-navy mb-3"></i>
            <h3 class="font-bold text-xl text-navy mb-1 font-hindi">एडमिन लॉगिन</h3>
            <input type="password" id="adminPassword" placeholder="••••••••" class="w-full border border-gray-300 rounded p-3 mb-6 text-center text-xl tracking-widest focus:border-navy outline-none mt-4">
            <div class="flex gap-2 font-hindi">
                <button onclick="closeAdminModal()" class="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded font-bold hover:bg-gray-200">रद्द करें</button>
                <button onclick="loginAdmin()" class="flex-1 bg-navy text-white py-2.5 rounded font-bold hover:bg-navy-light shadow">लॉगिन</button>
            </div>
        </div>
    </div>

    <!-- Loader & Toast -->
    <div id="loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-[150] hidden flex flex-col items-center justify-center">
        <div class="text-navy text-center">
            <i class="ph ph-circle-notch text-4xl animate-spin mb-3"></i>
            <p class="font-bold tracking-widest text-sm font-hindi" id="loaderText">कृपया प्रतीक्षा करें...</p>
        </div>
    </div>
    
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-navy text-white px-6 py-3 rounded shadow-xl opacity-0 transition-all duration-300 z-[200] font-bold text-sm pointer-events-none flex items-center gap-3 transform translate-y-4 border-l-4 border-gold">
        <i class="ph ph-info text-gold text-lg" id="toastIcon"></i>
        <span id="toastMsg" class="font-hindi"></span>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyC-xd1hY9pLjN5KXdvhesDMRrjwRwj-fMk",
          authDomain: "schoolmagazine-3a227.firebaseapp.com",
          projectId: "schoolmagazine-3a227",
          storageBucket: "schoolmagazine-3a227.firebasestorage.app",
          messagingSenderId: "809998632823",
          appId: "1:809998632823:web:703ebce93680af8de78372",
          measurementId: "G-631XSZFLPQ"
        };
        const myAppId = 'school-magazine-v2-hindi';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, articlesList = [], isAdmin = false;

        window.toggleMobileForm = () => {
            const fc = document.getElementById('formContainer');
            const fa = document.getElementById('formArrow');
            fc.classList.toggle('hidden');
            fc.classList.toggle('fade-in');
            fa.classList.toggle('rotate-180');
        };

        window.toggleExportModal = () => {
            document.getElementById('exportModal').classList.toggle('hidden');
        };

        window.toggleLoader = (show, txt="कृपया प्रतीक्षा करें...") => { 
            document.getElementById('loaderText').innerText = txt;
            document.getElementById('loader').classList.toggle('hidden', !show); 
        };

        window.showToast = (msg, type='info') => {
            const t = document.getElementById('toast'); 
            const ti = document.getElementById('toastIcon');
            document.getElementById('toastMsg').innerText = msg; 
            
            if(type === 'error') { ti.className = "ph ph-warning-circle text-red-400 text-lg"; t.style.borderColor = "#ef4444"; }
            else if(type === 'success') { ti.className = "ph ph-check-circle text-green-400 text-lg"; t.style.borderColor = "#22c55e"; }
            else { ti.className = "ph ph-info text-gold text-lg"; t.style.borderColor = "#c29a5b"; }

            t.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-4'), 3000);
        };

        document.getElementById('image').addEventListener('change', function(e) {
            const display = document.getElementById('fileName');
            display.textContent = e.target.files[0] ? e.target.files[0].name : "फोटो चुनें";
            display.classList.toggle('text-navy', !!e.target.files[0]);
        });

        onAuthStateChanged(auth, (u) => { if(u) { currentUser = u; fetchArticles(); } else signInAnonymously(auth); });

        function fetchArticles() {
            toggleLoader(true, "डेटा लोड हो रहा है...");
            onSnapshot(collection(db, 'artifacts', myAppId, 'public', 'data', 'articles'), (snap) => {
                articlesList = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => a.order - b.order);
                renderMagazine();
                toggleLoader(false);
            });
        }

        function renderMagazine() {
            const container = document.getElementById('pagesContainer');
            while(container.children.length > 1) container.removeChild(container.lastChild);

            if(articlesList.length === 0) {
                const empty = document.createElement('div');
                empty.className = "page-wrapper fade-in items-center justify-center text-gray-400 border border-gray-100 p-10 min-h-[300px]";
                empty.innerHTML = `<i class="ph ph-feather text-4xl mb-3 opacity-30"></i><p class="text-sm font-hindi">अभी तक कोई रचना नहीं है।</p>`;
                container.appendChild(empty);
                return;
            }

            articlesList.forEach((article, index) => {
                const imgPos = article.imgPos || 'top';
                let imgHtml = '';
                
                if(article.image) {
                    imgHtml = `
                    <div class="img-editorial ${'pos-'+imgPos}">
                        <img src="${article.image}" class="w-full h-auto" style="max-height: 380px; object-fit: contain; display: block; margin: 0 auto;">
                    </div>`;
                }

                let contentHtml = '';
                if (article.category === "हाइकु (Haiku)") {
                    contentHtml = `<div class="haiku-block">
                        ${article.content.split('\n').map(l=>`<p>${l}</p>`).join('')}
                        </div>`;
                } else if (article.category === "अनुवाद (Translation)") {
                    const lines = article.content.split('\n').filter(l=>l.trim());
                    for(let i=0; i<lines.length; i+=2) {
                        contentHtml += `<div class="trans-block"><div class="hi">${lines[i]}</div><div class="ml">${lines[i+1]||''}</div></div>`;
                    }
                }
                
                if (article.category === "हाइकु (Haiku)" || article.category === "अनुवाद (Translation)") {
                    contentHtml = `<div class="editorial-columns" style="column-count:1;">${imgPos === 'bottom' ? contentHtml + imgHtml : imgHtml + contentHtml}</div>`;
                } else {
                    const lines = article.content.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('');
                    contentHtml = `<div class="editorial-columns drop-cap">${imgHtml}${lines}</div>`;
                }

                let adminBar = '';
                let adminClass = '';
                if(isAdmin) {
                    adminClass = 'admin-active';
                    adminBar = `
                    <div class="admin-toolbar absolute top-0 left-0 w-full bg-navy/95 backdrop-blur text-white px-4 py-2.5 flex flex-wrap justify-between items-center no-print z-[60] border-b border-gray-600 shadow-md">
                        <div class="flex items-center gap-2">
                            <i class="ph ph-wrench text-gold text-lg"></i>
                            <span class="text-xs font-bold uppercase tracking-widest text-white font-hindi">प. सं. ${index + 1}</span>
                        </div>
                        <div class="flex items-center gap-1.5 mt-2 md:mt-0 font-hindi">
                            <button onclick="moveArticle('${article.id}', -1)" class="px-2.5 py-1.5 bg-white/10 hover:bg-white/20 rounded text-xs flex items-center gap-1 transition"><i class="ph ph-arrow-up text-gold"></i></button>
                            <button onclick="moveArticle('${article.id}', 1)" class="px-2.5 py-1.5 bg-white/10 hover:bg-white/20 rounded text-xs flex items-center gap-1 transition"><i class="ph ph-arrow-down text-gold"></i></button>
                            <div class="w-px h-5 bg-white/20 mx-2"></div>
                            <button onclick="openEditModal('${article.id}')" class="px-3 py-1.5 bg-blue-500/20 hover:bg-blue-500/40 text-blue-200 rounded text-xs flex items-center gap-1 transition font-bold"><i class="ph ph-pencil-simple"></i></button>
                            <button onclick="deleteArticle('${article.id}')" class="px-3 py-1.5 bg-red-500/30 hover:bg-red-500/60 text-white rounded text-xs flex items-center gap-1 transition font-bold"><i class="ph ph-trash"></i></button>
                        </div>
                    </div>`;
                }

                const page = document.createElement('div');
                page.className = `page-wrapper fade-in ${adminClass}`;
                page.innerHTML = `
                    ${adminBar}
                    <div class="page-inner">
                        
                        <!-- Header -->
                        <div class="flex justify-between items-center border-b border-gray-300 pb-3 mb-10 text-[10px] font-bold">
                            <span class="text-gold font-hindi">${article.category}</span>
                            <span class="text-gray-500 font-hindi">प. सं. ${String(index+1).padStart(2,'0')}</span>
                        </div>
                        
                        <!-- Title Area - Removed tracking classes -->
                        <div class="text-center mb-8 px-4">
                            <h2 class="text-4xl md:text-5xl font-black text-navy font-hindi leading-tight article-title">${article.title}</h2>
                        </div>

                        <!-- Content Flow -->
                        <div class="flex-1 overflow-hidden relative">
                            ${contentHtml}
                        </div>
                        
                        <!-- Student Name placed at the Bottom Right -->
                        <div class="mt-8 flex flex-col items-end justify-end w-full pt-4" style="page-break-inside: avoid;">
                            <span class="text-[11px] font-bold text-gray-500 mb-1 font-hindi">छात्र का नाम:</span>
                            <span class="text-lg font-hindi font-bold text-navy">${article.author}</span>
                            <div class="h-px w-16 bg-gold mt-2"></div>
                        </div>

                        <!-- Footer -->
                        <div class="mt-8 pt-4 flex justify-between items-center border-t border-gray-200">
                            <span class="text-[10px] font-bold text-gray-400 font-hindi">प्रेरणा संस्करण</span>
                            <span class="text-[10px] text-gray-400 font-hindi font-bold">२०२५ - २०२६</span>
                        </div>
                    </div>
                `;
                container.appendChild(page);
            });
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const content = document.getElementById('content').value.trim();
            const imgFile = document.getElementById('image').files[0];
            const imgPos = document.getElementById('imgPos').value;

            if(!title || !author || !content) return showToast("कृपया सभी बॉक्स भरें!", "error");

            toggleLoader(true, "सेव हो रहा है...");
            let imgData = null;
            if(imgFile) imgData = await compressImage(imgFile);

            try {
                await addDoc(collection(db, 'artifacts', myAppId, 'public', 'data', 'articles'), {
                    category, title, author, content, image: imgData, imgPos, order: Date.now()
                });
                document.getElementById('magazineForm').reset();
                document.getElementById('fileName').textContent = "फोटो चुनें";
                showToast("रचना सफलतापूर्वक जमा की गई!", "success");
                if(window.innerWidth < 1024) toggleMobileForm();
                setTimeout(()=> window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}), 800);
            } catch(e) { showToast("Error saving", "error"); }
            toggleLoader(false);
        });

        // Admin Access
        window.openAdminModal = () => { document.getElementById('adminModal').classList.remove('hidden'); document.getElementById('adminPassword').focus(); };
        window.closeAdminModal = () => { document.getElementById('adminModal').classList.add('hidden'); document.getElementById('adminPassword').value = ''; };
        
        window.loginAdmin = () => {
            if(document.getElementById('adminPassword').value === "admin123") {
                isAdmin = true;
                closeAdminModal();
                document.getElementById('adminBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('adminStatusBadge').classList.remove('hidden');
                document.getElementById('adminStatusBadge').classList.add('flex');
                document.getElementById('exportBtnWrapper').classList.remove('hidden'); 
                renderMagazine();
                showToast("एडमिन सक्रिय (Admin Active)", "success");
            } else { showToast("गलत पासवर्ड!", "error"); }
        };

        window.logoutAdmin = () => {
            isAdmin = false;
            document.getElementById('adminBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('adminStatusBadge').classList.add('hidden');
            document.getElementById('adminStatusBadge').classList.remove('flex');
            document.getElementById('exportBtnWrapper').classList.add('hidden');
            renderMagazine();
            showToast("लॉगआउट सफल", "success");
        };

        window.deleteArticle = async (id) => {
            if(!isAdmin) return;
            if(confirm("क्या आप वाकई इस पेज को डिलीट करना चाहते हैं?")) { 
                toggleLoader(true, "डिलीट हो रहा है..."); 
                try {
                    await deleteDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', id)); 
                    showToast("पेज डिलीट कर दिया गया", "success");
                } catch(error) {
                    showToast("Failed to delete", "error");
                } finally { toggleLoader(false); }
            }
        };

        window.moveArticle = async (id, dir) => {
            if(!isAdmin) return;
            const idx = articlesList.findIndex(a=>a.id===id);
            if(idx+dir >= 0 && idx+dir < articlesList.length) {
                toggleLoader(true, "क्रम बदल रहा है...");
                try {
                    const doc1 = articlesList[idx], doc2 = articlesList[idx+dir];
                    let newOrder1 = doc2.order;
                    let newOrder2 = doc1.order;
                    if(newOrder1 === newOrder2) newOrder1 += (dir * 10); 
                    await updateDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', doc1.id), {order: newOrder1});
                    await updateDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', doc2.id), {order: newOrder2});
                } catch(e) { showToast("Error", "error"); }
                toggleLoader(false);
            }
        };

        // Edit
        let editImgOriginal = null;
        window.openEditModal = (id) => {
            if(!isAdmin) return;
            const a = articlesList.find(x=>x.id===id);
            document.getElementById('editArticleId').value = a.id;
            document.getElementById('editCategory').value = a.category;
            document.getElementById('editTitle').value = a.title;
            document.getElementById('editAuthor').value = a.author;
            document.getElementById('editContent').value = a.content;
            document.getElementById('editImgPos').value = a.imgPos || 'top';
            editImgOriginal = a.image;
            
            const preview = document.getElementById('editImagePreview');
            const rmBtn = document.getElementById('removeImageBtn');
            if(a.image) { preview.src = a.image; preview.classList.remove('hidden'); rmBtn.classList.remove('hidden'); } 
            else { preview.classList.add('hidden'); rmBtn.classList.add('hidden'); }
            
            document.getElementById('editImageStatus').value = 'keep';
            document.getElementById('editModal').classList.remove('hidden');
        };
        window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');
        window.removeEditImage = () => { document.getElementById('editImageStatus').value = 'remove'; document.getElementById('editImagePreview').classList.add('hidden'); document.getElementById('removeImageBtn').classList.add('hidden'); };
        
        document.getElementById('editImage').addEventListener('change', (e) => {
             if(e.target.files[0]) {
                 document.getElementById('editImageStatus').value = 'change';
                 const r = new FileReader(); r.onload = (ev) => { document.getElementById('editImagePreview').src = ev.target.result; document.getElementById('editImagePreview').classList.remove('hidden'); document.getElementById('removeImageBtn').classList.remove('hidden'); };
                 r.readAsDataURL(e.target.files[0]);
             }
        });

        window.saveEditArticle = async () => {
            if(!isAdmin) return;
            toggleLoader(true, "अपडेट हो रहा है...");
            const id = document.getElementById('editArticleId').value;
            const status = document.getElementById('editImageStatus').value;
            let img = editImgOriginal;
            if(status === 'remove') img = null;
            if(status === 'change') img = await compressImage(document.getElementById('editImage').files[0]);

            try {
                await updateDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', id), {
                    category: document.getElementById('editCategory').value, title: document.getElementById('editTitle').value,
                    author: document.getElementById('editAuthor').value, content: document.getElementById('editContent').value,
                    imgPos: document.getElementById('editImgPos').value, image: img
                });
                closeEditModal(); 
                showToast("जानकारी अपडेट हो गई!", "success");
            } catch(e) { showToast("Error", "error"); }
            toggleLoader(false); 
        };

        // --- NATIVE PRINT FOR PDF (100% RELIABLE FOR HINDI) ---
        window.downloadPDF = () => {
            toggleExportModal(); 
            showToast("कृपया प्रिंट स्क्रीन में 'Save as PDF' और 'A4 Size' चुनें।", "info");
            setTimeout(() => {
                window.print();
            }, 1500);
        };

        // --- EXPORT WORD ---
        window.downloadAsWord = () => {
            toggleExportModal();
            let html = `<html xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><style>body{font-family:'Lora', 'Mangal', serif;} .title{color:#0f172a;font-size:28pt;font-weight:bold;text-align:center; margin-bottom:20px;} .author{text-align:right; color:#0f172a; margin-top:30px; font-size:14pt; font-weight:bold;} .author-label{text-align:right; font-size:10pt; color:#64748b;} .cat{color:#c29a5b;font-weight:bold; border-bottom:1px solid #e2e8f0; padding-bottom:5px; font-size:10pt}</style></head><body>`;
            
            html += `<div style="text-align:center; page-break-after:always; padding-top:150px;">
                        <h2 style="color:#c29a5b; font-size: 16pt;">सृजनलोक हिन्दी मंच , महात्मा गांधी कॉलेज, इरिटी</h2>
                        <p style="color:#64748b; font-size: 14pt;">द्वारा प्रस्तुत</p>
                        <h1 style="color:#0f172a; font-size:40pt; margin:20px 0;">हिन्दी हायकू संकलन</h1>
                     </div>`;

            articlesList.forEach(a => {
                html += `<div style="page-break-after:always"><p class="cat">${a.category}</p><p class="title">${a.title}</p>`;
                if(a.image) html += `<div style="text-align:center; margin-bottom:20px"><img src="${a.image}" width="450"></div>`;
                
                if (a.category === "अनुवाद (Translation)") {
                    const lines = a.content.split('\n').filter(l=>l.trim());
                    for(let i=0; i<lines.length; i+=2) {
                        html += `<p style="font-weight:bold; color:#0f172a; font-size:14pt">${lines[i]}</p>`;
                        if(lines[i+1]) html += `<p style="color:#475569">${lines[i+1]}</p>`;
                        html += `<br>`;
                    }
                } else if (a.category === "हाइकु (Haiku)") {
                     html += `<div style="text-align:center; padding:20px 0;">` + a.content.split('\n').map(l=>`<p style="font-weight:bold;color:#0f172a; font-size:16pt">${l}</p>`).join('') + `</div>`;
                } else {
                     html += `<div style="text-align:justify; line-height:1.6; font-size:11pt">` + a.content.split('\n').map(l=>`<p>${l}</p>`).join('') + `</div>`;
                }
                
                html += `<div style="margin-top:30px; text-align:right;"><p class="author-label">छात्र का नाम:</p><p class="author">${a.author}</p></div>`;
                html += `</div>`;
            });
            html += `</body></html>`;
            const b = new Blob(['\ufeff', html], {type:'application/msword'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download="Haiku_Sankalan.doc"; a.click();
            showToast("वर्ड फाइल डाउनलोड हो गई", "success");
        };

        window.downloadAsText = () => {
            toggleExportModal();
            let text = "सृजनलोक हिन्दी मंच, महात्मा गांधी कॉलेज, इरिटी द्वारा प्रस्तुत - हिन्दी हायकू संकलन\n\n";
            articlesList.forEach(a => {
                text += `=====================================\nश्रेणी: ${a.category}\nशीर्षक: ${a.title}\nछात्र का नाम: ${a.author}\n-------------------------------------\n\n${a.content}\n\n`;
            });
            const b = new Blob([text], {type:'text/plain;charset=utf-8'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download="Haiku_Sankalan.txt"; a.click();
        };

        window.downloadAsCSV = () => {
            toggleExportModal();
            let csvContent = "Category,Title,Student_Name,Content,Has_Image\n";
            articlesList.forEach(a => {
                const escapeCSV = (str) => `"${(str || '').replace(/"/g, '""')}"`;
                csvContent += `${escapeCSV(a.category)},${escapeCSV(a.title)},${escapeCSV(a.author)},${escapeCSV(a.content)},${a.image ? "Yes" : "No"}\n`;
            });
            const blob = new Blob(['\ufeff', csvContent], {type: 'text/csv;charset=utf-8;'}); 
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = "Haiku_Sankalan_Data.csv"; link.click();
        };

        window.downloadAsJSON = () => {
            toggleExportModal();
            const dataStr = JSON.stringify(articlesList, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = "Haiku_Sankalan_Backup.json"; link.click();
        };

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const cvs = document.createElement('canvas'); let w = img.width, h = img.height;
                        if(w>h && w>1000) { h*=1000/w; w=1000; } else if(h>1000) { w*=1000/h; h=1000; }
                        cvs.width=w; cvs.height=h; cvs.getContext('2d').drawImage(img,0,0,w,h);
                        resolve(cvs.toDataURL('image/jpeg', 0.8));
                    }
                }
            });
        }
    </script>

<!DOCTYPE html>
<html lang="hi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>प्रेरणा - हिन्दी हायकू संकलन</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Google Fonts (Safe for Print) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Serif+Devanagari:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'navy': '#0f172a',      
                        'navy-light': '#1e293b',
                        'gold': '#c29a5b',      
                        'gold-light': '#dfc28f',
                        'paper': '#ffffff',     
                        'ink': '#334155',       
                    },
                    fontFamily: {
                        'hindi': ['"Noto Serif Devanagari"', 'serif'],
                        'eng': ['"Playfair Display"', 'serif'],
                        'mal': ['"Anek Malayalam"', 'sans-serif'],
                        'body': ['"Lora"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Reset */
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; margin: 0; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }

        /* --- THE A4 SCALING ENGINE --- */
        .a4-page-wrapper {
            width: 100%;
            max-width: 794px; /* Exact A4 width at 96dpi */
            margin: 0 auto;
            position: relative;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
            /* Height will be strictly managed by JS on mobile, but defaults to A4 on desktop */
            height: 1123px;
        }

        .a4-page {
            width: 794px;
            height: 1123px; /* Exact A4 height at 96dpi */
            background-color: #ffffff;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 70px; /* Internal Margins */
        }

        /* Typography & Layouts (Locked sizes for perfect scaling) */
        h1, h2, h3, h4, p, span { letter-spacing: normal !important; text-shadow: none !important; }
        
        .editorial-columns { column-count: 1; column-gap: 40px; text-align: justify; }
        .editorial-columns p { margin-bottom: 25px; line-height: 1.8; font-size: 16px; color: #334155; font-family: 'Lora', 'Noto Serif Devanagari', serif; }
        
        /* Drop Cap */
        .drop-cap p:first-of-type::first-letter {
            font-size: 60px; float: left; line-height: 0.8; padding: 5px 15px 0 0;
            color: #0f172a; font-weight: 800; font-family: 'Noto Serif Devanagari', serif;
        }

        /* Haiku Layout */
        .haiku-block {
            position: relative; padding: 40px 0; margin: 40px 0; text-align: center;
            border-top: 2px solid #e2e8f0; border-bottom: 2px solid #e2e8f0;
            page-break-inside: avoid;
        }
        .haiku-block::before {
            content: '❝'; position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: #ffffff; padding: 0 15px; color: #c29a5b; font-size: 40px; line-height: 1; font-family: 'Playfair Display', serif;
        }
        .haiku-block p { font-size: 24px !important; font-weight: 700; color: #0f172a; margin-bottom: 15px !important; font-family: 'Noto Serif Devanagari', serif; line-height: 1.8; }

        /* Translation Layout */
        .trans-block { margin-bottom: 30px; padding-left: 20px; border-left: 3px solid #c29a5b; page-break-inside: avoid; }
        .trans-block .hi { font-size: 20px; font-weight: 700; color: #0f172a; font-family: 'Noto Serif Devanagari', serif; margin-bottom: 10px; line-height: 1.5; }
        .trans-block .ml { font-size: 16px; color: #64748b; font-family: 'Anek Malayalam', sans-serif; line-height: 1.6; }

        /* Images */
        .img-editorial { margin-bottom: 30px; display: flex; justify-content: center; align-items: center; }
        .pos-left { float: left; margin-right: 30px; width: 45%; shape-outside: margin-box; }
        .pos-right { float: right; margin-left: 30px; width: 45%; shape-outside: margin-box; }
        .pos-top { width: 100%; margin-bottom: 30px; } 
        .pos-bottom { width: 100%; margin-top: 30px; margin-bottom: 0;}

        /* Admin UI */
        .glass-input { 
            width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 6px; 
            background-color: #ffffff; font-family: 'Noto Serif Devanagari', serif; 
            outline: none; transition: all 0.2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        .glass-input:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05); }

        @media (min-width: 850px) { .editorial-columns { column-count: 2; } }

        /* --- NATIVE PRINT CSS (Zero issues, 100% precision) --- */
        @media print {
            @page { size: A4 portrait; margin: 0 !important; }
            html, body { width: 210mm !important; height: 100% !important; margin: 0 !important; padding: 0 !important; background: #ffffff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            nav, aside, .no-print, #adminModal, #exportModal, #toast, #loader, #editModal, .admin-toolbar { display: none !important; }
            .flex-1, .flex-col, .xl\:flex-row { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            #printArea { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            #pagesContainer { display: block !important; width: 100% !important; gap: 0 !important; margin: 0 !important; padding: 0 !important; }
            
            .a4-page-wrapper { 
                width: 210mm !important; 
                height: 297mm !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                border-radius: 0 !important; 
                page-break-after: always !important; 
                page-break-inside: avoid !important;
                border: none !important; 
                transform: none !important;
            }
            .a4-page {
                width: 210mm !important;
                height: 297mm !important;
                transform: none !important; /* Disables JS scaling for pure print */
                position: relative !important;
                padding: 20mm !important;
            }
            .cover-page .a4-page { border: 10mm solid #0f172a !important; padding: 15mm !important; }
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen text-navy font-hindi">

    <!-- Premium Navbar -->
    <nav class="sticky top-0 bg-white shadow-sm z-50 border-b border-gray-200 no-print">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-navy p-2 rounded text-white"><i class="ph ph-feather-bold text-xl"></i></div>
                <div class="flex flex-col leading-none">
                    <h1 class="text-xl md:text-2xl font-black font-hindi text-navy">हायकू संकलन</h1>
                    <p class="text-[10px] text-gray-500 font-hindi mt-1 font-bold">हिन्दी विभाग</p>
                </div>
            </div>
            
            <div class="flex gap-2 items-center flex-wrap justify-end">
                <div id="adminStatusBadge" class="hidden items-center gap-2 px-3 py-1.5 bg-green-50 text-green-700 border border-green-200 rounded-full text-xs font-bold mr-1">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                    एडमिन सक्रिय
                </div>

                <div id="exportBtnWrapper" class="hidden">
                    <button onclick="toggleExportModal()" class="bg-navy hover:bg-navy-light text-white px-4 py-2 rounded text-xs font-bold flex items-center gap-2 shadow-md font-hindi">
                        <i class="ph ph-export text-lg"></i> <span class="hidden sm:inline">डाउनलोड</span>
                    </button>
                </div>

                <button id="adminBtn" onclick="openAdminModal()" class="p-2 text-gray-400 hover:text-navy rounded-full hover:bg-gray-100" title="एडमिन लॉगिन">
                    <i class="ph ph-shield-check text-2xl"></i>
                </button>
                <button id="logoutBtn" onclick="logoutAdmin()" class="hidden p-2 text-red-400 hover:text-red-600 rounded-full hover:bg-red-50" title="लॉगआउट">
                    <i class="ph ph-sign-out text-2xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <div class="flex-1 w-full max-w-[1400px] mx-auto flex flex-col xl:flex-row gap-6 p-4 lg:p-6">
        
        <!-- Left Sidebar: Form -->
        <aside class="w-full xl:w-[360px] flex-shrink-0 no-print">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden sticky top-24">
                <button onclick="toggleMobileForm()" class="w-full p-5 bg-navy text-white flex justify-between items-center xl:cursor-default">
                    <div class="flex items-center gap-3">
                        <i class="ph ph-pen-nib text-xl text-gold-light"></i>
                        <h2 class="font-bold font-hindi text-lg">रचना प्रस्तुत करें</h2>
                    </div>
                    <i id="formArrow" class="ph ph-caret-down xl:hidden transition-transform duration-300"></i>
                </button>
                
                <div id="formContainer" class="p-5 hidden xl:block space-y-4">
                    <form id="magazineForm" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 block mb-1 font-hindi">श्रेणी</label>
                            <select id="category" class="glass-input font-bold text-navy">
                                <option value="हाइकु (Haiku)">हाइकु (Haiku)</option>
                                <option value="अनुवाद (Translation)">अनुवाद (Translation)</option>
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="text-xs font-bold text-gray-500 block mb-1 font-hindi">शीर्षक <span class="text-red-500">*</span></label>
                                <input type="text" id="title" class="glass-input font-bold text-lg" placeholder="शीर्षक दर्ज करें...">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-500 block mb-1 font-hindi">छात्र का नाम व कक्षा <span class="text-red-500">*</span></label>
                                <input type="text" id="author" class="glass-input" placeholder="नाम...">
                            </div>
                        </div>

                        <div class="p-3 border border-gray-200 rounded bg-gray-50">
                            <label class="text-xs font-bold text-gray-500 block mb-2 font-hindi">चित्र (वैकल्पिक)</label>
                            <label class="flex flex-col items-center justify-center w-full h-16 border border-gray-300 border-dashed bg-white rounded cursor-pointer hover:border-navy group">
                                <div class="flex items-center gap-2">
                                    <i class="ph ph-image text-lg text-gray-400 group-hover:text-navy"></i>
                                    <span class="text-xs text-gray-500 font-hindi" id="fileName">फोटो चुनें</span>
                                </div>
                                <input type="file" id="image" accept="image/*" class="hidden">
                            </label>
                            <label class="text-xs font-bold text-gray-500 block mt-3 mb-1 font-hindi">चित्र का स्थान</label>
                            <select id="imgPos" class="glass-input py-2 text-sm">
                                <option value="top">ऊपर (Top)</option><option value="bottom">नीचे (Bottom)</option><option value="left">बाएं (Left Wrap)</option><option value="right">दाएं (Right Wrap)</option>
                            </select>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="text-xs font-bold text-gray-500 block font-hindi">विषय / रचना <span class="text-red-500">*</span></label>
                                <span class="text-[10px] text-gray-400 italic">Hindi ↵ Mal</span>
                            </div>
                            <textarea id="content" rows="6" placeholder="यहाँ लिखें..." class="glass-input resize-none leading-relaxed"></textarea>
                        </div>

                        <button type="button" id="submitBtn" class="w-full bg-navy text-white py-3 rounded shadow hover:bg-navy-light font-bold font-hindi flex items-center justify-center gap-2 text-lg">
                            <i class="ph ph-paper-plane-right"></i> प्रस्तुत करें
                        </button>
                    </form>
                </div>
            </div>
        </aside>

        <!-- Right: Print / Magazine Canvas (A4 Scaler) -->
        <main class="flex-1 w-full" id="printArea">
            <div id="pagesContainer" class="w-full flex flex-col items-center gap-8 pb-10">
                
                <!-- Fixed Cover Page -->
                <div class="page-group w-full max-w-[794px]">
                    <div class="a4-page-wrapper cover-page border-8 border-navy">
                        <div class="a4-page items-center justify-center relative">
                            <div class="absolute inset-4 border border-gray-200 z-10 pointer-events-none"></div>
                            
                            <div class="z-20 text-center flex flex-col items-center w-full h-full justify-center px-10">
                                <div class="mb-10 w-full">
                                    <h2 class="text-navy text-3xl font-bold font-hindi leading-snug">सृजनलोक हिन्दी मंच, महात्मा गांधी कॉलेज, इरिटी</h2>
                                    <p class="text-gray-500 text-xl font-hindi mt-4 font-semibold">द्वारा प्रस्तुत</p>
                                    <div class="h-1 w-32 bg-gold mx-auto mt-8"></div>
                                </div>
                                
                                <h1 class="text-[7rem] font-black font-hindi text-navy mb-0" style="line-height: 1.1;">हिन्दी हायकू<br>संकलन</h1>
                                
                                <div class="my-16">
                                    <i class="ph ph-feather text-[5rem] text-gold"></i>
                                </div>
                                
                                <div class="mt-auto pt-10 flex justify-between w-full text-xl font-bold text-navy font-hindi border-t border-gray-200">
                                    <span>अंक १</span>
                                    <span>२०२५ - २०२६</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Articles injected here -->
            </div>
        </main>
    </div>

    <!-- Export Manager Modal (Admin Only) -->
    <div id="exportModal" class="hidden fixed inset-0 bg-navy/90 z-[120] flex items-center justify-center p-4 backdrop-blur-sm no-print">
        <div class="bg-white rounded-xl w-full max-w-md shadow-2xl fade-in overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="font-bold text-lg text-navy flex items-center gap-2 font-hindi"><i class="ph ph-export text-gold"></i> डाउनलोड विकल्प</h3>
                <button onclick="toggleExportModal()" class="text-gray-400 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            
            <div class="p-6 space-y-3">
                <button onclick="downloadPDF()" class="w-full flex items-center gap-4 p-4 border border-indigo-200 rounded-lg bg-indigo-50 hover:bg-indigo-100 transition text-left relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] font-bold px-3 py-1 rounded-bl">RECOMMENDED</div>
                    <div class="bg-white p-3 rounded-full text-indigo-600 shadow-sm"><i class="ph ph-printer text-2xl"></i></div>
                    <div>
                        <h4 class="font-bold text-navy font-hindi text-base">प्रिंट / पीडीएफ (Print PDF)</h4>
                        <p class="text-xs text-gray-600 font-hindi">मैगज़ीन को परफेक्ट लेआउट में सेव करें</p>
                    </div>
                </button>

                <button onclick="downloadAsWord()" class="w-full flex items-center gap-4 p-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition text-left">
                    <div class="bg-blue-100 p-3 rounded-full text-blue-600"><i class="ph ph-file-doc text-2xl"></i></div>
                    <div>
                        <h4 class="font-bold text-navy font-hindi text-base">वर्ड (Word)</h4>
                        <p class="text-xs text-gray-500 font-hindi">एडिट करने योग्य फाइल</p>
                    </div>
                </button>
                
                <button onclick="downloadAsCSV()" class="w-full flex items-center gap-4 p-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition text-left">
                    <div class="bg-green-100 p-3 rounded-full text-green-600"><i class="ph ph-file-csv text-2xl"></i></div>
                    <div>
                        <h4 class="font-bold text-navy font-hindi text-base">एक्सेल (Excel)</h4>
                        <p class="text-xs text-gray-500 font-hindi">डेटा शीट फॉर्मेट</p>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Modal (Minimal) -->
    <div id="editModal" class="hidden fixed inset-0 bg-navy/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm no-print">
        <div class="bg-white w-full max-w-lg rounded-lg shadow-2xl flex flex-col max-h-[90vh] overflow-hidden fade-in">
            <div class="px-6 py-4 bg-white border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-lg text-navy flex items-center gap-2 font-hindi"><i class="ph ph-pencil-simple text-gold"></i> संपादित करें</h3>
                <button onclick="closeEditModal()" class="w-8 h-8 rounded bg-gray-50 text-gray-500 flex items-center justify-center hover:bg-red-50 hover:text-red-500"><i class="ph ph-x"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-4">
                <input type="hidden" id="editArticleId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 font-hindi">श्रेणी</label>
                        <select id="editCategory" class="glass-input py-2 text-sm mt-1 font-hindi">
                            <option value="हाइकु (Haiku)">हाइकु (Haiku)</option>
                            <option value="अनुवाद (Translation)">अनुवाद (Translation)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 font-hindi">छात्र का नाम</label>
                        <input type="text" id="editAuthor" class="glass-input py-2 text-sm mt-1">
                    </div>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-500 font-hindi">शीर्षक</label>
                    <input type="text" id="editTitle" class="glass-input font-bold mt-1 text-navy">
                </div>
                
                <div class="p-4 bg-gray-50 rounded border border-gray-200">
                    <label class="text-xs font-bold text-gray-500 block mb-2 font-hindi">चित्र बदलें</label>
                    <div class="flex items-center gap-4 mb-3">
                        <img id="editImagePreview" class="w-16 h-16 object-cover rounded border border-gray-300 hidden">
                        <label class="flex-1 cursor-pointer">
                            <div class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded text-sm font-bold text-center hover:border-navy font-hindi">नया फोटो चुनें</div>
                            <input type="file" id="editImage" accept="image/*" class="hidden">
                        </label>
                    </div>
                    <select id="editImgPos" class="glass-input py-2 text-sm bg-white mb-2 font-hindi">
                        <option value="top">ऊपर (Top)</option><option value="bottom">नीचे (Bottom)</option><option value="left">बाएं (Left Wrap)</option><option value="right">दाएं (Right Wrap)</option>
                    </select>
                    <button id="removeImageBtn" class="text-xs text-red-500 font-bold w-full text-right hidden font-hindi" onclick="removeEditImage()">फोटो हटाएं</button>
                    <input type="hidden" id="editImageStatus" value="keep">
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-500 font-hindi">विषय</label>
                    <textarea id="editContent" rows="6" class="glass-input mt-1 resize-none"></textarea>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-5 py-2 text-gray-500 font-bold hover:bg-gray-200 rounded font-hindi">रद्द करें</button>
                <button onclick="saveEditArticle()" class="bg-navy hover:bg-navy-light text-white px-6 py-2 rounded font-bold font-hindi">सुरक्षित करें</button>
            </div>
        </div>
    </div>

    <!-- Admin Login -->
    <div id="adminModal" class="hidden fixed inset-0 bg-navy/80 z-[120] flex items-center justify-center p-4 backdrop-blur-sm no-print">
        <div class="bg-white p-8 rounded-lg w-full max-w-sm shadow-2xl fade-in text-center border-t-4 border-navy">
            <i class="ph ph-shield-check text-4xl text-navy mb-3"></i>
            <h3 class="font-bold text-xl text-navy mb-1 font-hindi">एडमिन लॉगिन</h3>
            <input type="password" id="adminPassword" placeholder="••••••••" class="w-full border border-gray-300 rounded p-3 mb-6 text-center text-xl tracking-widest focus:border-navy outline-none mt-4 font-eng">
            <div class="flex gap-2 font-hindi">
                <button onclick="closeAdminModal()" class="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded font-bold hover:bg-gray-200">रद्द करें</button>
                <button onclick="loginAdmin()" class="flex-1 bg-navy text-white py-2.5 rounded font-bold hover:bg-navy-light shadow">लॉगिन</button>
            </div>
        </div>
    </div>

    <!-- Loader & Toast -->
    <div id="loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-[150] hidden flex flex-col items-center justify-center">
        <div class="text-navy text-center">
            <i class="ph ph-circle-notch text-4xl animate-spin mb-3"></i>
            <p class="font-bold font-hindi mt-2 text-sm" id="loaderText">कृपया प्रतीक्षा करें...</p>
        </div>
    </div>
    
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-navy text-white px-6 py-3 rounded shadow-xl opacity-0 transition-all duration-300 z-[200] font-bold text-sm pointer-events-none flex items-center gap-3 transform translate-y-4 border-l-4 border-gold">
        <i class="ph ph-info text-gold text-lg" id="toastIcon"></i>
        <span id="toastMsg" class="font-hindi"></span>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyC-xd1hY9pLjN5KXdvhesDMRrjwRwj-fMk",
          authDomain: "schoolmagazine-3a227.firebaseapp.com",
          projectId: "schoolmagazine-3a227",
          storageBucket: "schoolmagazine-3a227.firebasestorage.app",
          messagingSenderId: "809998632823",
          appId: "1:809998632823:web:703ebce93680af8de78372"
        };
        const myAppId = 'school-magazine-v2-hindi';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, articlesList = [], isAdmin = false;

        window.toggleMobileForm = () => {
            const fc = document.getElementById('formContainer');
            const fa = document.getElementById('formArrow');
            fc.classList.toggle('hidden'); fc.classList.toggle('fade-in'); fa.classList.toggle('rotate-180');
        };

        window.toggleExportModal = () => document.getElementById('exportModal').classList.toggle('hidden');

        window.toggleLoader = (show, txt="कृपया प्रतीक्षा करें...") => { 
            document.getElementById('loaderText').innerText = txt;
            document.getElementById('loader').classList.toggle('hidden', !show); 
        };

        window.showToast = (msg, type='info') => {
            const t = document.getElementById('toast'); 
            const ti = document.getElementById('toastIcon');
            document.getElementById('toastMsg').innerText = msg; 
            if(type === 'error') { ti.className = "ph ph-warning-circle text-red-400 text-lg"; t.style.borderColor = "#ef4444"; }
            else if(type === 'success') { ti.className = "ph ph-check-circle text-green-400 text-lg"; t.style.borderColor = "#22c55e"; }
            else { ti.className = "ph ph-info text-gold text-lg"; t.style.borderColor = "#c29a5b"; }
            t.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-4'), 3000);
        };

        document.getElementById('image').addEventListener('change', function(e) {
            const display = document.getElementById('fileName');
            display.textContent = e.target.files[0] ? e.target.files[0].name : "फोटो चुनें";
            display.classList.toggle('text-navy', !!e.target.files[0]);
        });

        // Smart Scaling Engine for Mobile Screens
        function scalePagesForMobile() {
            const wrappers = document.querySelectorAll('.a4-page-wrapper');
            wrappers.forEach(wrapper => {
                const page = wrapper.querySelector('.a4-page');
                if(!page) return;
                const wrapperWidth = wrapper.clientWidth;
                if (wrapperWidth < 794) {
                    const scale = wrapperWidth / 794;
                    page.style.transform = `scale(${scale})`;
                    wrapper.style.height = `${1123 * scale}px`; 
                } else {
                    page.style.transform = `none`;
                    wrapper.style.height = `1123px`;
                }
            });
        }
        window.addEventListener('resize', scalePagesForMobile);

        onAuthStateChanged(auth, (u) => { if(u) { currentUser = u; fetchArticles(); } else signInAnonymously(auth); });

        function fetchArticles() {
            toggleLoader(true, "डेटा लोड हो रहा है...");
            onSnapshot(collection(db, 'artifacts', myAppId, 'public', 'data', 'articles'), (snap) => {
                articlesList = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => a.order - b.order);
                renderMagazine();
                toggleLoader(false);
            });
        }

        function renderMagazine() {
            const container = document.getElementById('pagesContainer');
            // Keep Cover Page
            while(container.children.length > 1) container.removeChild(container.lastChild);

            if(articlesList.length === 0) {
                const empty = document.createElement('div');
                empty.className = "page-group w-full max-w-[794px] text-center p-10 border border-gray-200 text-gray-400 bg-white rounded";
                empty.innerHTML = `<i class="ph ph-feather text-4xl mb-2 opacity-50"></i><p class="text-sm font-hindi">अभी तक कोई रचना नहीं है।</p>`;
                container.appendChild(empty);
            } else {
                articlesList.forEach((article, index) => {
                    const imgPos = article.imgPos || 'top';
                    let imgHtml = '';
                    if(article.image) {
                        imgHtml = `
                        <div class="img-editorial ${'pos-'+imgPos}">
                            <img src="${article.image}" style="max-height: 400px; max-width: 100%; object-fit: contain;">
                        </div>`;
                    }

                    let contentHtml = '';
                    if (article.category === "हाइकु (Haiku)") {
                        contentHtml = `<div class="haiku-block">${article.content.split('\n').map(l=>`<p>${l}</p>`).join('')}</div>`;
                    } else if (article.category === "अनुवाद (Translation)") {
                        const lines = article.content.split('\n').filter(l=>l.trim());
                        for(let i=0; i<lines.length; i+=2) {
                            contentHtml += `<div class="trans-block"><div class="hi">${lines[i]}</div><div class="ml">${lines[i+1]||''}</div></div>`;
                        }
                    }
                    
                    if (article.category === "हाइकु (Haiku)" || article.category === "अनुवाद (Translation)") {
                        contentHtml = `<div class="editorial-columns" style="column-count:1;">${imgPos === 'bottom' ? contentHtml + imgHtml : imgHtml + contentHtml}</div>`;
                    } else {
                        const lines = article.content.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('');
                        contentHtml = `<div class="editorial-columns drop-cap">${imgHtml}${lines}</div>`;
                    }

                    let adminBar = '';
                    if(isAdmin) {
                        adminBar = `
                        <div class="bg-navy text-white px-4 py-2 flex flex-wrap justify-between items-center no-print w-full rounded-t-md mb-[-4px] z-10 relative">
                            <div class="flex items-center gap-2"><i class="ph ph-wrench text-gold"></i><span class="text-xs font-hindi">प. सं. ${index + 1} सेटिंग्स</span></div>
                            <div class="flex items-center gap-2">
                                <button onclick="moveArticle('${article.id}', -1)" class="px-2 py-1 bg-white/10 hover:bg-white/20 rounded text-xs"><i class="ph ph-arrow-up text-gold"></i></button>
                                <button onclick="moveArticle('${article.id}', 1)" class="px-2 py-1 bg-white/10 hover:bg-white/20 rounded text-xs"><i class="ph ph-arrow-down text-gold"></i></button>
                                <div class="w-px h-4 bg-white/20 mx-1"></div>
                                <button onclick="openEditModal('${article.id}')" class="px-3 py-1 bg-blue-500/20 hover:bg-blue-500/40 text-blue-200 rounded text-xs font-bold font-hindi"><i class="ph ph-pencil-simple"></i> एडिट</button>
                                <button onclick="deleteArticle('${article.id}')" class="px-3 py-1 bg-red-500/30 hover:bg-red-500/60 text-white rounded text-xs font-bold font-hindi"><i class="ph ph-trash"></i> डिलीट</button>
                            </div>
                        </div>`;
                    }

                    const pageGroup = document.createElement('div');
                    pageGroup.className = "page-group w-full max-w-[794px] fade-in";
                    pageGroup.innerHTML = `
                        ${adminBar}
                        <div class="a4-page-wrapper">
                            <div class="a4-page">
                                <div class="flex justify-between items-center border-b border-gray-300 pb-4 mb-10">
                                    <span class="text-gold font-hindi font-bold text-sm tracking-wider uppercase">${article.category}</span>
                                    <span class="text-gray-500 font-hindi font-bold text-sm tracking-wider">प. सं. ${String(index+1).padStart(2,'0')}</span>
                                </div>
                                
                                <div class="text-center mb-10 px-4">
                                    <h2 class="text-[40px] font-black text-navy font-hindi leading-tight">${article.title}</h2>
                                </div>

                                <div class="flex-1 overflow-hidden relative">
                                    ${contentHtml}
                                </div>
                                
                                <div class="mt-8 flex flex-col items-end justify-end w-full pt-4 border-t border-gray-100" style="page-break-inside: avoid;">
                                    <span class="text-[14px] font-bold text-gray-500 mb-1 font-hindi">छात्र का नाम:</span>
                                    <span class="text-[22px] font-hindi font-bold text-navy">${article.author}</span>
                                    <div class="h-1 w-20 bg-gold mt-3"></div>
                                </div>

                                <div class="mt-10 pt-4 flex justify-between items-center border-t border-gray-200">
                                    <span class="text-xs font-bold text-gray-400 font-hindi tracking-wider">प्रेरणा संस्करण</span>
                                    <span class="text-xs text-gray-400 font-hindi font-bold">२०२५ - २०२६</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(pageGroup);
                });
            }
            // Trigger scaling engine after DOM elements are created
            setTimeout(scalePagesForMobile, 50);
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const content = document.getElementById('content').value.trim();
            const imgFile = document.getElementById('image').files[0];
            const imgPos = document.getElementById('imgPos').value;

            if(!title || !author || !content) return showToast("कृपया सभी बॉक्स भरें!", "error");
            toggleLoader(true, "सेव हो रहा है...");
            let imgData = null;
            if(imgFile) imgData = await compressImage(imgFile);

            try {
                await addDoc(collection(db, 'artifacts', myAppId, 'public', 'data', 'articles'), {
                    category, title, author, content, image: imgData, imgPos, order: Date.now()
                });
                document.getElementById('magazineForm').reset();
                document.getElementById('fileName').textContent = "फोटो चुनें";
                showToast("रचना सफलतापूर्वक जमा की गई!", "success");
                if(window.innerWidth < 1024) toggleMobileForm();
                setTimeout(()=> window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}), 800);
            } catch(e) { showToast("Error saving", "error"); }
            toggleLoader(false);
        });

        window.openAdminModal = () => { document.getElementById('adminModal').classList.remove('hidden'); document.getElementById('adminPassword').focus(); };
        window.closeAdminModal = () => { document.getElementById('adminModal').classList.add('hidden'); document.getElementById('adminPassword').value = ''; };
        
        window.loginAdmin = () => {
            if(document.getElementById('adminPassword').value === "admin123") {
                isAdmin = true;
                closeAdminModal();
                document.getElementById('adminBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('adminStatusBadge').classList.remove('hidden');
                document.getElementById('adminStatusBadge').classList.add('flex');
                document.getElementById('exportBtnWrapper').classList.remove('hidden'); 
                renderMagazine();
                showToast("एडमिन सक्रिय", "success");
            } else { showToast("गलत पासवर्ड!", "error"); }
        };

        window.logoutAdmin = () => {
            isAdmin = false;
            document.getElementById('adminBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('adminStatusBadge').classList.add('hidden');
            document.getElementById('adminStatusBadge').classList.remove('flex');
            document.getElementById('exportBtnWrapper').classList.add('hidden');
            renderMagazine();
            showToast("लॉगआउट सफल", "success");
        };

        window.deleteArticle = async (id) => {
            if(!isAdmin) return;
            if(confirm("क्या आप वाकई इस पेज को डिलीट करना चाहते हैं?")) { 
                toggleLoader(true, "डिलीट हो रहा है..."); 
                try {
                    await deleteDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', id)); 
                    showToast("पेज डिलीट कर दिया गया", "success");
                } catch(error) { showToast("Failed to delete", "error"); } finally { toggleLoader(false); }
            }
        };

        window.moveArticle = async (id, dir) => {
            if(!isAdmin) return;
            const idx = articlesList.findIndex(a=>a.id===id);
            if(idx+dir >= 0 && idx+dir < articlesList.length) {
                toggleLoader(true, "क्रम बदल रहा है...");
                try {
                    const doc1 = articlesList[idx], doc2 = articlesList[idx+dir];
                    let newOrder1 = doc2.order; let newOrder2 = doc1.order;
                    if(newOrder1 === newOrder2) newOrder1 += (dir * 10); 
                    await updateDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', doc1.id), {order: newOrder1});
                    await updateDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', doc2.id), {order: newOrder2});
                } catch(e) { showToast("Error", "error"); }
                toggleLoader(false);
            }
        };

        let editImgOriginal = null;
        window.openEditModal = (id) => {
            if(!isAdmin) return;
            const a = articlesList.find(x=>x.id===id);
            document.getElementById('editArticleId').value = a.id;
            document.getElementById('editCategory').value = a.category;
            document.getElementById('editTitle').value = a.title;
            document.getElementById('editAuthor').value = a.author;
            document.getElementById('editContent').value = a.content;
            document.getElementById('editImgPos').value = a.imgPos || 'top';
            editImgOriginal = a.image;
            
            const preview = document.getElementById('editImagePreview');
            const rmBtn = document.getElementById('removeImageBtn');
            if(a.image) { preview.src = a.image; preview.classList.remove('hidden'); rmBtn.classList.remove('hidden'); } 
            else { preview.classList.add('hidden'); rmBtn.classList.add('hidden'); }
            
            document.getElementById('editImageStatus').value = 'keep';
            document.getElementById('editModal').classList.remove('hidden');
        };
        window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');
        window.removeEditImage = () => { document.getElementById('editImageStatus').value = 'remove'; document.getElementById('editImagePreview').classList.add('hidden'); document.getElementById('removeImageBtn').classList.add('hidden'); };
        
        document.getElementById('editImage').addEventListener('change', (e) => {
             if(e.target.files[0]) {
                 document.getElementById('editImageStatus').value = 'change';
                 const r = new FileReader(); r.onload = (ev) => { document.getElementById('editImagePreview').src = ev.target.result; document.getElementById('editImagePreview').classList.remove('hidden'); document.getElementById('removeImageBtn').classList.remove('hidden'); };
                 r.readAsDataURL(e.target.files[0]);
             }
        });

        window.saveEditArticle = async () => {
            if(!isAdmin) return;
            toggleLoader(true, "अपडेट हो रहा है...");
            const id = document.getElementById('editArticleId').value;
            const status = document.getElementById('editImageStatus').value;
            let img = editImgOriginal;
            if(status === 'remove') img = null;
            if(status === 'change') img = await compressImage(document.getElementById('editImage').files[0]);

            try {
                await updateDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'articles', id), {
                    category: document.getElementById('editCategory').value, title: document.getElementById('editTitle').value,
                    author: document.getElementById('editAuthor').value, content: document.getElementById('editContent').value,
                    imgPos: document.getElementById('editImgPos').value, image: img
                });
                closeEditModal(); 
                showToast("जानकारी अपडेट हो गई!", "success");
            } catch(e) { showToast("Error", "error"); }
            toggleLoader(false); 
        };

        // --- PDF EXPORT (PROPER WAY) ---
        window.downloadPDF = () => {
            toggleExportModal(); 
            // Important instruction for iOS / iPad users
            showToast("नोट: प्रिंट डायलॉग में 'Save to Files' या 'Print to PDF' चुनें।", "info");
            setTimeout(() => {
                window.print();
            }, 1500);
        };

        window.downloadAsWord = () => {
            toggleExportModal();
            let html = `<html xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><style>body{font-family:'Lora', 'Mangal', serif;} .title{color:#0f172a;font-size:28pt;font-weight:bold;text-align:center; margin-bottom:20px;} .author{text-align:right; color:#0f172a; margin-top:30px; font-size:14pt; font-weight:bold;} .author-label{text-align:right; font-size:10pt; color:#64748b;} .cat{color:#c29a5b;font-weight:bold; border-bottom:1px solid #e2e8f0; padding-bottom:5px; font-size:10pt}</style></head><body>`;
            html += `<div style="text-align:center; page-break-after:always; padding-top:150px;"><h2 style="color:#c29a5b; font-size: 16pt;">सृजनलोक हिन्दी मंच , महात्मा गांधी कॉलेज, इरिटी</h2><p style="color:#64748b; font-size: 14pt;">द्वारा प्रस्तुत</p><h1 style="color:#0f172a; font-size:40pt; margin:20px 0;">हिन्दी हायकू संकलन</h1></div>`;

            articlesList.forEach(a => {
                html += `<div style="page-break-after:always"><p class="cat">${a.category}</p><p class="title">${a.title}</p>`;
                if(a.image) html += `<div style="text-align:center; margin-bottom:20px"><img src="${a.image}" width="450"></div>`;
                if (a.category === "अनुवाद (Translation)") {
                    const lines = a.content.split('\n').filter(l=>l.trim());
                    for(let i=0; i<lines.length; i+=2) { html += `<p style="font-weight:bold; color:#0f172a; font-size:14pt">${lines[i]}</p>`; if(lines[i+1]) html += `<p style="color:#475569">${lines[i+1]}</p><br>`; }
                } else if (a.category === "हाइकु (Haiku)") {
                     html += `<div style="text-align:center; padding:20px 0;">` + a.content.split('\n').map(l=>`<p style="font-weight:bold;color:#0f172a; font-size:16pt">${l}</p>`).join('') + `</div>`;
                } else {
                     html += `<div style="text-align:justify; line-height:1.6; font-size:11pt">` + a.content.split('\n').map(l=>`<p>${l}</p>`).join('') + `</div>`;
                }
                html += `<div style="margin-top:30px; text-align:right;"><p class="author-label">छात्र का नाम:</p><p class="author">${a.author}</p></div></div>`;
            });
            html += `</body></html>`;
            const b = new Blob(['\ufeff', html], {type:'application/msword'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download="Haiku_Sankalan.doc"; a.click();
            showToast("वर्ड फाइल डाउनलोड हो गई", "success");
        };

        window.downloadAsCSV = () => {
            toggleExportModal();
            let csvContent = "Category,Title,Student_Name,Content,Has_Image\n";
            articlesList.forEach(a => {
                const escapeCSV = (str) => `"${(str || '').replace(/"/g, '""')}"`;
                csvContent += `${escapeCSV(a.category)},${escapeCSV(a.title)},${escapeCSV(a.author)},${escapeCSV(a.content)},${a.image ? "Yes" : "No"}\n`;
            });
            const blob = new Blob(['\ufeff', csvContent], {type: 'text/csv;charset=utf-8;'}); 
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = "Haiku_Sankalan_Data.csv"; link.click();
        };

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const cvs = document.createElement('canvas'); let w = img.width, h = img.height;
                        if(w>h && w>1000) { h*=1000/w; w=1000; } else if(h>1000) { w*=1000/h; h=1000; }
                        cvs.width=w; cvs.height=h; cvs.getContext('2d').drawImage(img,0,0,w,h);
                        resolve(cvs.toDataURL('image/jpeg', 0.8));
                    }
                }
            });
        }
    </script>
</body>
</html>
